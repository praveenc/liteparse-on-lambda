<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteParse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: oklch(0.98 0.005 150);
    --surface: oklch(1 0.002 150);
    --surface-alt: oklch(0.96 0.006 150);
    --border: oklch(0.88 0.01 150);
    --border-active: oklch(0.72 0.04 155);
    --text: oklch(0.18 0.015 150);
    --text-secondary: oklch(0.42 0.02 150);
    --text-muted: oklch(0.58 0.015 150);
    --accent: oklch(0.45 0.14 155);
    --accent-light: oklch(0.92 0.04 155);
    --accent-surface: oklch(0.96 0.02 155);
    --accent-glow: oklch(0.45 0.14 155 / 0.08);
    --error: oklch(0.55 0.2 25);
    --error-light: oklch(0.95 0.03 25);
    --warning: oklch(0.6 0.15 70);
    --radius: 10px;
    --shadow-sm: 0 1px 3px oklch(0.2 0.01 150 / 0.06);
    --shadow-md: 0 4px 12px oklch(0.2 0.01 150 / 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1.5rem;
    line-height: 1.6;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.5s ease;
  }

  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.04em;
    margin-bottom: 0.3rem;
    color: var(--text);
  }

  .header h1 span {
    color: var(--accent);
  }

  .header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 400;
  }

  .container {
    width: 100%;
    max-width: 640px;
    animation: fadeUp 0.5s ease;
  }

  /* Drop Zone */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 3.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: var(--accent-surface);
    box-shadow: var(--shadow-md), 0 0 0 4px var(--accent-glow);
  }

  .dropzone-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    opacity: 0.6;
    transition: transform 0.25s ease;
  }

  .dropzone:hover .dropzone-icon {
    transform: translateY(-3px);
    opacity: 0.9;
  }

  .dropzone-text {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-secondary);
  }

  .dropzone-text strong {
    color: var(--accent);
    font-weight: 600;
  }

  .dropzone-formats {
    margin-top: 0.8rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.02em;
  }

  .dropzone input[type="file"] {
    display: none;
  }

  /* Status Card */
  .status-card {
    margin-top: 1.5rem;
    padding: 1.25rem 1.5rem;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1px solid var(--border);
    display: none;
    animation: fadeUp 0.3s ease;
    box-shadow: var(--shadow-sm);
  }

  .status-card.visible { display: block; }

  .status-file-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .status-file-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .status-file-info {
    flex: 1;
    min-width: 0;
  }

  .status-filename {
    font-family: 'Outfit', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .status-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    gap: 0.75rem;
  }

  .status-elapsed {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    background: var(--surface-alt);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
  }

  /* Progress bar */
  .progress-container {
    margin-bottom: 0.75rem;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface-alt);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }

  .progress-fill.indeterminate {
    width: 30% !important;
    animation: indeterminate 1.5s ease-in-out infinite;
  }

  @keyframes indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(430%); }
  }

  /* Status phases */
  .status-phases {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .phase {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    color: var(--text-muted);
    transition: color 0.3s ease;
  }

  .phase.active {
    color: var(--accent);
    font-weight: 500;
  }

  .phase.done {
    color: var(--text-secondary);
  }

  .phase-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s ease;
  }

  .phase.active .phase-dot {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .phase.done .phase-dot {
    background: var(--text-secondary);
  }

  .phase-separator {
    width: 12px;
    height: 1px;
    background: var(--border);
    margin: 0 0.15rem;
  }

  /* Status message */
  .status-message {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .status-message .status-elapsed {
    margin-left: auto;
  }

  .status-message .spinner-small {
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  /* Error and success states */
  .status-card.error {
    border-color: oklch(0.85 0.06 25);
    background: var(--error-light);
  }
  .status-card.error .status-message { color: var(--error); font-weight: 500; }
  .status-card.error .progress-fill { background: var(--error); }

  .status-card.success {
    border-color: oklch(0.82 0.06 155);
    background: var(--accent-surface);
  }
  .status-card.success .status-message { color: var(--accent); font-weight: 500; }

  .checkmark-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Results */
  .results {
    margin-top: 1.5rem;
    display: none;
    animation: fadeUp 0.4s ease;
  }

  .results.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .results-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .results-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
    box-shadow: var(--shadow-sm);
  }

  .btn:hover {
    border-color: var(--border-active);
    background: var(--surface-alt);
    box-shadow: var(--shadow-md);
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: oklch(0.40 0.14 155);
    border-color: oklch(0.40 0.14 155);
    color: white;
  }

  .preview-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    max-height: 400px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.76rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: var(--shadow-sm);
  }

  .preview-box::-webkit-scrollbar {
    width: 6px;
  }

  .preview-box::-webkit-scrollbar-track {
    background: transparent;
  }

  .preview-box::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  /* Tab switcher */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: fit-content;
    box-shadow: var(--shadow-sm);
  }

  .tab {
    padding: 0.45rem 1rem;
    font-size: 0.76rem;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    color: var(--text-muted);
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    border-right: 1px solid var(--border);
  }

  .tab:last-child { border-right: none; }

  .tab.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 500;
  }

  .tab:hover:not(.active) {
    color: var(--text);
    background: var(--surface-alt);
  }

  /* Reset button */
  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 1.5rem;
    padding: 0.6rem 1.2rem;
    font-size: 0.84rem;
    font-family: 'Outfit', sans-serif;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-surface);
    border: 1px solid oklch(0.82 0.06 155);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow-sm);
  }

  .reset-btn:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Lite<span>Parse</span></h1>
  <p>Drop a document, get structured text back</p>
</div>

<div class="container">
  <div class="dropzone" id="dropzone">
    <span class="dropzone-icon">&#x2B21;</span>
    <div class="dropzone-text">
      Drag & drop a file here, or <strong>click to browse</strong>
    </div>
    <div class="dropzone-formats">PDF . DOCX . XLSX . PPTX . PNG . JPG</div>
    <input type="file" id="fileInput" accept=".pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg">
  </div>

  <div class="status-card" id="statusCard">
    <div class="status-file-row">
      <div class="status-file-icon" id="fileIcon">&#x1F4C4;</div>
      <div class="status-file-info">
        <div class="status-filename" id="statusFilename"></div>
        <div class="status-meta">
          <span id="fileSizeMeta"></span>
          <span id="fileTypeMeta"></span>
        </div>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="status-phases" id="statusPhases">
      <div class="phase" id="phaseUpload">
        <span class="phase-dot"></span>
        <span>Upload</span>
      </div>
      <span class="phase-separator"></span>
      <div class="phase" id="phaseParse">
        <span class="phase-dot"></span>
        <span>Parse</span>
      </div>
      <span class="phase-separator"></span>
      <div class="phase" id="phaseDone">
        <span class="phase-dot"></span>
        <span>Done</span>
      </div>
    </div>

    <div class="status-message" id="statusMessage" style="margin-top: 0.6rem;">
      <span class="spinner-small" id="statusSpinner"></span>
      <span id="statusText"></span>
      <span class="status-elapsed" id="statusElapsed"></span>
    </div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <span class="results-title">Parsed Output</span>
      <div class="results-actions">
        <button class="btn btn-primary" id="downloadTxt">&#x2193; .txt</button>
        <button class="btn" id="downloadJson">&#x2193; .json</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="text">Text</button>
      <button class="tab" data-tab="json">JSON</button>
    </div>
    <div class="preview-box" id="previewBox"></div>
    <button class="reset-btn" id="resetLink">&#x2190; Parse another document</button>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const statusCard = document.getElementById('statusCard');
const statusFilename = document.getElementById('statusFilename');
const statusElapsed = document.getElementById('statusElapsed');
const statusMessage = document.getElementById('statusMessage');
const statusText = document.getElementById('statusText');
const statusSpinner = document.getElementById('statusSpinner');
const progressFill = document.getElementById('progressFill');
const fileSizeMeta = document.getElementById('fileSizeMeta');
const fileTypeMeta = document.getElementById('fileTypeMeta');
const fileIcon = document.getElementById('fileIcon');
const results = document.getElementById('results');
const previewBox = document.getElementById('previewBox');
const downloadTxt = document.getElementById('downloadTxt');
const downloadJson = document.getElementById('downloadJson');
const resetLink = document.getElementById('resetLink');

const phaseUpload = document.getElementById('phaseUpload');
const phaseParse = document.getElementById('phaseParse');
const phaseDone = document.getElementById('phaseDone');

let cachedText = '';
let cachedJson = '';
let elapsedInterval = null;

// File type icons and labels
const FILE_TYPES = {
  'pdf': { icon: '\u{1F4D1}', label: 'PDF' },
  'docx': { icon: '\u{1F4DD}', label: 'DOCX' },
  'xlsx': { icon: '\u{1F4CA}', label: 'XLSX' },
  'pptx': { icon: '\u{1F4CA}', label: 'PPTX' },
  'png': { icon: '\u{1F5BC}', label: 'PNG' },
  'jpg': { icon: '\u{1F5BC}', label: 'JPG' },
  'jpeg': { icon: '\u{1F5BC}', label: 'JPEG' },
};

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function getFileExt(name) {
  return (name.split('.').pop() || '').toLowerCase();
}

// Drag and drop
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    showPreview(tab.dataset.tab);
  });
});

// Downloads
downloadTxt.addEventListener('click', () => downloadBlob(cachedText, 'text/plain', '.txt'));
downloadJson.addEventListener('click', () => downloadBlob(cachedJson, 'application/json', '.json'));

resetLink.addEventListener('click', reset);

function reset() {
  statusCard.className = 'status-card';
  results.className = 'results';
  dropzone.style.display = 'block';
  fileInput.value = '';
  cachedText = '';
  cachedJson = '';
  setPhase('none');
  progressFill.style.width = '0%';
  progressFill.classList.remove('indeterminate');
}

function setPhase(phase) {
  [phaseUpload, phaseParse, phaseDone].forEach(p => {
    p.classList.remove('active', 'done');
  });

  if (phase === 'upload') {
    phaseUpload.classList.add('active');
  } else if (phase === 'parse') {
    phaseUpload.classList.add('done');
    phaseParse.classList.add('active');
  } else if (phase === 'done') {
    phaseUpload.classList.add('done');
    phaseParse.classList.add('done');
    phaseDone.classList.add('active');
  }
}

function showStatusCard(filename, file) {
  const ext = getFileExt(filename);
  const typeInfo = FILE_TYPES[ext] || { icon: '\u{1F4C4}', label: ext.toUpperCase() };

  statusFilename.textContent = filename;
  fileIcon.textContent = typeInfo.icon;
  fileSizeMeta.textContent = formatFileSize(file.size);
  fileTypeMeta.textContent = typeInfo.label;
  statusCard.className = 'status-card visible';
  statusCard.classList.remove('error', 'success');
  statusSpinner.style.display = 'inline-block';
}

async function handleFile(file) {
  dropzone.style.display = 'none';
  const start = Date.now();

  showStatusCard(file.name, file);
  setPhase('upload');
  statusText.textContent = 'Uploading...';
  progressFill.style.width = '10%';
  progressFill.classList.remove('indeterminate');

  // Update elapsed time every second
  elapsedInterval = setInterval(() => {
    const elapsed = ((Date.now() - start) / 1000).toFixed(0);
    statusElapsed.textContent = elapsed + 's';
  }, 250);

  try {
    // Upload phase
    const form = new FormData();
    form.append('file', file);

    // Simulate upload progress (we can't truly track fetch upload)
    progressFill.style.width = '25%';
    statusText.textContent = 'Sending to parser...';

    // Transition to parse phase
    setTimeout(() => {
      setPhase('parse');
      statusText.textContent = 'Parsing document...';
      progressFill.classList.add('indeterminate');
    }, 500);

    const [textResp, jsonResp] = await Promise.all([
      fetch('/api/parse?text=true', { method: 'POST', body: form }),
      fetch('/api/parse', { method: 'POST', body: (() => { const f = new FormData(); f.append('file', file); return f; })() }),
    ]);

    clearInterval(elapsedInterval);
    progressFill.classList.remove('indeterminate');

    if (!textResp.ok) {
      const err = await textResp.json().catch(() => ({ error: textResp.statusText }));
      throw new Error(err.detail || err.error || 'Parse failed');
    }
    if (!jsonResp.ok) {
      const err = await jsonResp.json().catch(() => ({ error: jsonResp.statusText }));
      throw new Error(err.detail || err.error || 'Parse failed');
    }

    cachedText = await textResp.text();
    cachedJson = await jsonResp.text();

    // Success state
    const elapsed = ((Date.now() - start) / 1000).toFixed(1);
    statusElapsed.textContent = elapsed + 's';
    progressFill.style.width = '100%';
    setPhase('done');
    statusSpinner.style.display = 'none';
    statusCard.classList.add('success');

    // Show parsed content stats with elapsed time
    const charCount = cachedText.length;
    const lineCount = cachedText.split('\n').length;
    statusText.textContent = `${lineCount.toLocaleString()} lines, ${charCount.toLocaleString()} chars`;

    showPreview('text');
    results.className = 'results visible';

  } catch (err) {
    clearInterval(elapsedInterval);
    progressFill.classList.remove('indeterminate');
    progressFill.style.width = '100%';
    statusCard.classList.add('error');
    statusSpinner.style.display = 'none';
    statusText.textContent = err.message;
    setPhase('none');
  }
}

function showPreview(tab) {
  if (tab === 'text') {
    previewBox.textContent = cachedText || 'No content';
  } else {
    try {
      previewBox.textContent = JSON.stringify(JSON.parse(cachedJson), null, 2);
    } catch {
      previewBox.textContent = cachedJson || 'No content';
    }
  }
}

function downloadBlob(content, mimeType, ext) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (statusFilename.textContent || 'document') + ext;
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
